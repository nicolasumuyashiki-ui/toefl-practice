<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope','Zen Kaku Gothic New','Noto Sans JP',system-ui,sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column;color:#002817;line-height:1.7}
/* ===== TOP NAV ===== */
.top-nav{background:#fff;border-bottom:1px solid #F5E9D3;padding:10px 24px;display:flex;align-items:center;justify-content:space-between}
.top-nav-left{display:flex;align-items:center;gap:16px;font-size:.9em;color:#5A6861}
.top-nav-left strong{color:#002817}
.top-nav-right{display:flex;align-items:center;gap:12px}
.timer-btn{background:none;border:1px solid #D6DAD7;border-radius:6px;padding:6px 14px;font-size:.85em;color:#5A6861;cursor:pointer;font-family:inherit;transition:all .2s}
.timer-btn:hover{background:#FBF6EC}
.timer-display{font-family:'Courier New',monospace;font-size:.9em;color:#002817;font-weight:600;min-width:60px;text-align:center}
.review-btn{background:#007646;color:#fff;border:none;border-radius:14px;padding:6px 18px;font-size:.85em;cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s}
.review-btn:hover{background:#004D2E}
.user-badge{font-size:.8em;color:#5A6861}
.user-badge strong{color:#002817}
/* ===== PROGRESS BAR ===== */
.progress-bar{height:4px;background:#F5E9D3;width:100%}
.progress-fill{height:100%;background:#007646;border-radius:2px;transition:width .3s}
/* ===== MAIN CONTENT ===== */
.ctw-main{flex:1;max-width:800px;margin:0 auto;padding:40px 32px 100px;width:100%}
.instruction{font-weight:600;font-size:.95em;color:#007646;margin-bottom:20px}
.passage{font-size:.95em;line-height:2.2;color:#002817;margin-bottom:16px}
/* ===== WORD BLANKS (1-char boxes like Module 1) ===== */
.word-blank{display:inline-block;white-space:nowrap;margin-right:.45em}
.sh{font-size:.95em;margin-right:.22em}
.bx{display:inline-block;width:1.5em;height:1.9em;border:1px solid #bbb;border-radius:2px;background:#F5E9D3;text-align:center;vertical-align:baseline;margin:0 .5px;position:relative}
.bx input{width:100%;height:100%;border:none;background:transparent;text-align:center;font-size:1em;font-family:inherit;outline:none;padding:0;color:#002817}
.bx:focus-within{background:#F5E9D3;border-color:#007646}
.bx.correct{background:#d4edda;border-color:#007646}
.bx.correct input{color:#002817}
.bx.incorrect{background:#FDF4F0;border-color:#B85C3C}
.bx.incorrect input{color:#B85C3C}
/* ===== FOOTER NAV ===== */
.reading-footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F5E9D3;padding:14px 24px;display:flex;justify-content:flex-end;gap:12px;z-index:100}
.btn-nav{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;font-size:.95em;font-family:inherit;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.btn-back{color:#5A6861;background:#fff;border:1px solid #F5E9D3}
.btn-back:hover{background:#FBF6EC}
.btn-back:disabled{opacity:.5;cursor:not-allowed}
.btn-next{color:#fff;background:#002817}
.btn-next:hover{background:#004D2E;box-shadow:0 6px 18px rgba(0,118,70,.22)}
.btn-next svg{width:16px;height:16px;fill:currentColor}
/* ===== REVIEW OVERLAY ===== */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;justify-content:center;align-items:center}
.overlay.active{display:flex}
.review-panel{background:#fff;border-radius:12px;width:90%;max-width:820px;max-height:80vh;display:flex;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.review-left{flex:55%;border-right:1px solid #F5E9D3;overflow-y:auto;padding:0}
.review-right{flex:45%;padding:28px;overflow-y:auto;background:#FBF6EC}
.review-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid #F5E9D3;position:sticky;top:0;background:#fff;z-index:1}
.review-header h3{font-size:1em;color:#002817}
.review-close{background:none;border:none;font-size:1.3em;cursor:pointer;color:#5A6861;padding:4px 8px;border-radius:4px}
.review-close:hover{background:#FBF6EC}
.review-row{display:flex;padding:12px 20px;border-bottom:1px solid #F5E9D3;cursor:pointer;align-items:center;font-size:.88em;transition:background .15s}
.review-row:hover,.review-row.active{background:#F5E9D3}
.review-no{width:36px;color:#5A6861;font-weight:500}
.review-q{flex:1;color:#002817}
.review-status{font-size:.8em;padding:3px 10px;border-radius:10px;white-space:nowrap}
.review-status.answered{background:#E6F3EC;color:#002817}
.review-status.not-answered{background:#FDF4F0;color:#B85C3C}
.review-status.coming{background:#F5E9D3;color:#5A6861}
.detail-label{display:inline-block;background:#F5E9D3;color:#007646;font-size:.75em;font-weight:600;padding:3px 10px;border-radius:10px;margin-bottom:12px}
.detail-title{font-size:1.05em;font-weight:700;color:#002817;margin-bottom:12px}
.detail-desc{font-size:.88em;color:#5A6861;line-height:1.65;margin-bottom:20px}
.btn-goto{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;font-size:.85em;font-family:inherit;font-weight:600;color:#fff;background:#007646;border:none;border-radius:14px;cursor:pointer;transition:all .2s}
.btn-goto:hover{background:#004D2E}
.btn-goto.disabled{background:#D6DAD7;cursor:not-allowed}
</style>

<body data-difficulty="harder">

<!-- TOP NAV -->
<div class="top-nav">
  <div class="top-nav-left"><img class="brand-logo" src="../assets/tck-logo.png" alt="TCK Workshop" style="height:28px;width:auto;margin-right:12px"><span>Question <strong>1&ndash;10</strong> of 20</span>
    <span>|</span>
    <span>Reading &mdash; Module 2</span>
  </div>
  <div class="top-nav-right">
    <span class="timer-display" id="timer">12:00</span>
    <button class="timer-btn" onclick="toggleTimer()">Hide Time</button>
    <button class="review-btn" onclick="openReview()">Review</button>
    <span class="user-badge" id="userBadge"></span>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" style="width:5%"></div></div>

<!-- MAIN CONTENT -->
<div class="ctw-main">
  <p class="instruction">Fill in the missing letters in the paragraph.</p>
  <p class="passage" id="passage"></p>
</div>

<!-- FOOTER NAV -->
<div class="reading-footer">
  <button class="btn-nav btn-back" disabled>&#8249; Back</button>
  <button class="btn-nav btn-next" onclick="goNext()">Next &#8250;
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>
</div>

<!-- REVIEW OVERLAY -->
<div class="overlay" id="reviewOverlay">
  <div class="review-panel">
    <div class="review-left">
      <div class="review-header">
        <h3>Review Questions</h3>
        <button class="review-close" onclick="closeReview()">&times;</button>
      </div>
      <div id="reviewList"></div>
    </div>
    <div class="review-right" id="reviewDetail">
      <div class="detail-label">Reading &mdash; Module 2</div>
      <div class="detail-title">Select a question to see details</div>
      <div class="detail-desc">Click on any question in the list to view its description and navigate to it.</div>
    </div>
  </div>
</div>

<script>
/* ===== PASSAGE DATA =====
   Topic: Cognitive biases in decision-making (higher difficulty than M2E)
   Pattern: ETS alternating — blank/full every other word in target section
   10 blanks, 10 full words interleaved
*/
var intro = "Bread fermentation is one of the oldest examples of applied biochemistry, transforming a simple mixture of flour, water, and yeast into a complex and flavorful food.";

var blanks = [
  {given:"yea", answer:"sts"},
  {given:"carb", answer:"ohydrates"},
  {given:"alc", answer:"ohol"},
  {given:"carb", answer:"on"},
  {given:"expan", answer:"ding"},
  {given:"do", answer:"ugh"},
  {given:"glu", answer:"ten"},
  {given:"tra", answer:"p"},
  {given:"ga", answer:"ses"},
  {given:"ba", answer:"king"}
];

var fullWords = ["metabolize","producing","and","dioxide,","the","structure.","networks","the","while","stabilizes"];

var conclusion = "the entire crumb structure into the airy interior that we recognize as bread.";

/* Surrounding text fragments that connect blanks and full words into natural sentences */
var fragments = [
  "Researchers have demonstrated that individuals ",  // before blank 1
  " the accuracy of their judgments. They consistently ", // between blank 1 → full 2 → blank 2
  " the ",                                            // before blank 3
  " ",                                                // before blank 4
  " with ",                                           // before blank 5 (after full 4)
  " and ",                                            // before blank 6
  " ",                                                // before blank 7
  " Even when presented with ",                       // before blank 8
  " people frequently rely on intuition rather than ", // before blank 9
  " a tendency that remains remarkably "              // before blank 10
];

/* ===== BUILD PASSAGE ===== */
var inputIdx = 0;

function buildPassage(){
  var h = '<span>' + intro + '</span> ';

  for(var i = 0; i < 10; i++){
    var b = blanks[i];

    // Build word-blank: given letters + individual boxes
    h += '<span class="word-blank"><span class="sh">' + b.given + '</span><span class="boxes">';
    for(var j = 0; j < b.answer.length; j++){
      h += '<span class="bx"><input type="text" maxlength="1" '
        + 'data-idx="' + inputIdx + '" '
        + 'data-word="' + i + '" '
        + 'data-char="' + j + '" '
        + 'data-answer="' + b.answer[j] + '" '
        + 'autocomplete="off" autocorrect="off" autocapitalize="off" '
        + 'inputmode="latin" lang="en" spellcheck="false">'
        + '</span>';
      inputIdx++;
    }
    h += '</span></span> ';

    // Add full word after blank
    h += fullWords[i] + ' ';
  }

  h += conclusion;
  document.getElementById('passage').innerHTML = h;
}

buildPassage();

/* ===== INPUT HANDLING ===== */
var allInputs;

function setupInputs(){
  allInputs = document.querySelectorAll('.bx input');
  allInputs.forEach(function(inp, idx){
    // Auto-advance on typing
    inp.addEventListener('input', function(){
      var val = this.value;
      if(val.length === 1){
        // Check correct/incorrect
        var answer = this.getAttribute('data-answer').toLowerCase();
        var bxEl = this.parentElement;
        bxEl.classList.remove('correct','incorrect');
        if(val.toLowerCase() === answer){
          bxEl.classList.add('correct');
        } else {
          bxEl.classList.add('incorrect');
        }
        // Auto-advance to next box
        if(idx < allInputs.length - 1){
          allInputs[idx + 1].focus();
        }
      }
    });

    // Handle backspace and arrow keys
    inp.addEventListener('keydown', function(e){
      if(e.key === 'Backspace' && this.value === '' && idx > 0){
        e.preventDefault();
        allInputs[idx - 1].focus();
        allInputs[idx - 1].value = '';
        allInputs[idx - 1].parentElement.classList.remove('correct','incorrect');
      }
      if(e.key === 'ArrowRight' && idx < allInputs.length - 1){
        e.preventDefault();
        allInputs[idx + 1].focus();
      }
      if(e.key === 'ArrowLeft' && idx > 0){
        e.preventDefault();
        allInputs[idx - 1].focus();
      }
    });
  });
}

setupInputs();

/* ===== TIMER (12 minutes for Hard Module 2) ===== */
var timeLeft = 12 * 60;
var timerVisible = true;
var timerInterval = setInterval(function(){
  timeLeft--;
  if(timeLeft <= 0){ clearInterval(timerInterval); timeLeft = 0; }
  var m = Math.floor(timeLeft / 60);
  var s = timeLeft % 60;
  document.getElementById('timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
}, 1000);

function toggleTimer(){
  timerVisible = !timerVisible;
  document.getElementById('timer').style.visibility = timerVisible ? 'visible' : 'hidden';
  document.querySelector('.timer-btn').textContent = timerVisible ? 'Hide Time' : 'Show Time';
}

/* ===== REVIEW DATA ===== */
var questions = [
  {no:"1-10", title:"Complete the Words", desc:"Fill in the missing letters in a paragraph about the chemistry of bread fermentation.", section:"Reading", page:"reading-m2h-ctw.html"},
  {no:"11", title:"Academic Passage 1 (Q11)", desc:"Answer a vocabulary question about epigenetics and inherited behavior.", section:"Reading", page:"reading-m2h-academic1.html"},
  {no:"12", title:"Academic Passage 1 (Q12)", desc:"Answer an inference question about the famine study.", section:"Reading", page:"reading-m2h-academic1.html"},
  {no:"13", title:"Academic Passage 1 (Q13)", desc:"Identify the rhetorical purpose of a key phrase.", section:"Reading", page:"reading-m2h-academic1.html"},
  {no:"14", title:"Academic Passage 1 (Q14)", desc:"Identify a limitation of transgenerational research.", section:"Reading", page:"reading-m2h-academic1.html"},
  {no:"15", title:"Academic Passage 1 (Q15)", desc:"Summarize the main argument of the passage.", section:"Reading", page:"reading-m2h-academic1.html"},
  {no:"16", title:"Academic Passage 2 (Q16)", desc:"Answer a factual question about linguistic relativity.", section:"Reading", page:"reading-m2h-academic2.html"},
  {no:"17", title:"Academic Passage 2 (Q17)", desc:"Draw an inference from a cross-linguistic color study.", section:"Reading", page:"reading-m2h-academic2.html"},
  {no:"18", title:"Academic Passage 2 (Q18)", desc:"Identify the meaning of a word in context.", section:"Reading", page:"reading-m2h-academic2.html"},
  {no:"19", title:"Academic Passage 2 (Q19)", desc:"Explain the rhetorical purpose of a research detail.", section:"Reading", page:"reading-m2h-academic2.html"},
  {no:"20", title:"Academic Passage 2 (Q20)", desc:"Identify the author's conclusion about the hypothesis.", section:"Reading", page:"reading-m2h-academic2.html"}
];

/* ===== REVIEW ===== */
function openReview(){
  var html = '';
  var ctwAnswered = 0;
  allInputs.forEach(function(inp){ if(inp.value.trim()) ctwAnswered++; });
  var totalBoxes = allInputs.length;

  questions.forEach(function(q, i){
    var st, cls;
    if(q.no === '1-10'){
      st = ctwAnswered + '/' + totalBoxes + ' Filled';
      cls = ctwAnswered === totalBoxes ? 'answered' : 'not-answered';
    } else {
      st = 'Not Started';
      cls = 'not-answered';
    }
    html += '<div class="review-row" onclick="showDetail('+i+')" data-idx="'+i+'">';
    html += '<span class="review-no">'+q.no+'</span>';
    html += '<span class="review-q">'+q.title+'</span>';
    html += '<span class="review-status '+cls+'">'+st+'</span></div>';
  });
  document.getElementById('reviewList').innerHTML = html;
  document.getElementById('reviewOverlay').classList.add('active');
  showDetail(0);
}

function showDetail(idx){
  var q = questions[idx];
  document.querySelectorAll('.review-row').forEach(function(r){ r.classList.remove('active'); });
  var rows = document.querySelectorAll('.review-row');
  if(rows[idx]) rows[idx].classList.add('active');

  var btn; if(q.qPage!==undefined&&q.page==='reading-m2h-ctw.html'){btn='<button class="btn-goto" onclick="closeReview();goToPage('+q.qPage+')">Go to Question &#8250;<\/button>';}else if(q.page&&q.page!=='reading-m2h-ctw.html'){btn='<button class="btn-goto" onclick="window.location.href=\''+q.page+'\'">Go to Question &#8250;<\/button>';}else{btn='<button class="btn-goto" onclick="closeReview()">Go to Question &#8250;<\/button>';}
  document.getElementById('reviewDetail').innerHTML =
    '<div class="detail-label">'+q.section+'</div>'+
    '<div class="detail-title">'+q.title+'</div>'+
    '<div class="detail-desc">'+q.desc+'</div>'+btn;
}

function closeReview(){
  document.getElementById('reviewOverlay').classList.remove('active');
}
document.getElementById('reviewOverlay').addEventListener('click', function(e){
  if(e.target === this) closeReview();
});

/* ===== NAVIGATION ===== */
function goToPage(p){if(typeof totalPages!=='undefined'&&p>=1&&p<=totalPages){document.getElementById('page'+currentPage).classList.remove('active');currentPage=p;document.getElementById('page'+currentPage).classList.add('active');var l=document.getElementById('qLabel');if(l)l.textContent=(startQ+currentPage-1);var b=document.getElementById('btnBack');if(b)b.disabled=(currentPage===1);var n=document.getElementById('btnNext');if(n){if(currentPage===totalPages){n.onclick=function(){goNext();};}else{n.onclick=function(){changePage(1);};}}}}

function saveM2hCTWScore(){
  var correct = 0;
  for(var i=0;i<blanks.length;i++){
    var inputs = document.querySelectorAll('input[data-word="'+i+'"]');
    var typed = '';
    for(var j=0;j<inputs.length;j++){ typed += inputs[j].value; }
    if(typed.toLowerCase() === blanks[i].answer.toLowerCase()) correct++;
  }
  localStorage.setItem('m2h_ctw_correct', String(correct));
  localStorage.setItem('m2h_ctw_total',   String(blanks.length));
}

function goNext(){
  saveM2hCTWScore();
  window.location.href = 'reading-m2h-academic1.html';
}

/* ===== AUTH ===== */
if(typeof Auth !== 'undefined'){
  Auth.require();
  Auth.showBadge('userBadge');
}

/* IME / non-ASCII input lock — TOEFL is English-only, so block
   composition events and strip non-ASCII chars on input/paste.
   Multi-layer defense for cross-browser coverage. */
(function(){
  var nodes = document.querySelectorAll('.bx input');
  function strip(s){ return String(s||'').replace(/[^\x20-\x7E]/g, ''); }
  nodes.forEach(function(el){
    el.addEventListener('compositionstart', function(e){ e.preventDefault(); try{el.blur();el.focus();}catch(e2){} });
    el.addEventListener('beforeinput', function(e){
      var t = e.inputType||'', d = e.data;
      if (d && /[^\x20-\x7E]/.test(d) && (t==='insertText'||t==='insertCompositionText'||t==='insertFromPaste'||t==='insertFromDrop')) e.preventDefault();
    });
    el.addEventListener('input', function(){
      var c = strip(el.value);
      if (c !== el.value) el.value = c;
    });
    el.addEventListener('paste', function(e){
      var t = (e.clipboardData||window.clipboardData).getData('text');
      if (/[^\x20-\x7E]/.test(t)){ e.preventDefault(); el.value = strip(t); }
    });
  });
})();
</script>
<script src="../js/difficulty-badge.js"></script>
<script src="../js/auth.js"></script>
</body>
