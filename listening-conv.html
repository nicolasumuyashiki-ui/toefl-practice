<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL iBT - Listen to a Conversation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#ebf4ff;color:#2d3748;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ===== TOP NAV ===== */
.top-nav{display:flex;justify-content:space-between;align-items:center;background:#2d3748;color:#fff;padding:10px 24px;font-size:14px;}
.nav-left{font-weight:500;}
.nav-left strong{color:#90cdf4;}
.nav-right{display:flex;align-items:center;gap:16px;}
.timer-display{font-family:'Courier New',monospace;font-size:15px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:4px;background:rgba(255,255,255,0.1);}
.timer-display.warning{color:#fc8181;animation:blink 0.8s infinite;}
.timer-display.hidden-timer{visibility:hidden;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.btn-timer-toggle{background:none;border:1px solid rgba(255,255,255,0.3);color:#cbd5e0;padding:4px 12px;border-radius:4px;font-size:12px;cursor:pointer;}
.btn-timer-toggle:hover{background:rgba(255,255,255,0.1);}
.user-badge{background:rgba(255,255,255,0.15);padding:4px 12px;border-radius:12px;font-size:12px;color:#e2e8f0;}

/* ===== PROGRESS BAR ===== */
.progress-bar-container{height:4px;background:#e2e8f0;}
.progress-bar{height:100%;background:#4a90d9;transition:width 0.4s ease;}

/* ===== MAIN CONTENT — LEFT/RIGHT SPLIT ===== */
.main-content{flex:1;display:flex;overflow:hidden;}

/* Left Panel — Conversation Image */
.left-panel{
    flex:0 0 50%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#f0f4f8;border-right:2px solid #e2e8f0;padding:24px;position:relative;
    transition:flex-basis 0.3s ease;
}
.left-panel.full-width{
    flex:1 1 100%;border-right:none;
}
.conv-image{max-width:100%;max-height:70vh;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}

/* Audio Indicator */
.audio-indicator{
    display:none;position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    background:rgba(45,55,72,0.9);color:#fff;padding:10px 24px;border-radius:24px;
    font-size:14px;align-items:center;gap:12px;
}
.audio-indicator.visible{display:flex;}
.wave-bars{display:flex;gap:3px;align-items:flex-end;height:20px;}
.wave-bar{width:3px;background:#90cdf4;border-radius:2px;animation:wave 1s ease-in-out infinite;}
.wave-bar:nth-child(1){height:8px;animation-delay:0s;}
.wave-bar:nth-child(2){height:14px;animation-delay:0.15s;}
.wave-bar:nth-child(3){height:20px;animation-delay:0.3s;}
.wave-bar:nth-child(4){height:14px;animation-delay:0.45s;}
.wave-bar:nth-child(5){height:8px;animation-delay:0.6s;}
@keyframes wave{0%,100%{transform:scaleY(0.5);}50%{transform:scaleY(1);}}

/* Right Panel — Question + Choices */
.right-panel{
    flex:1;display:flex;flex-direction:column;justify-content:center;
    padding:32px 40px;overflow-y:auto;
}
.question-area{max-width:560px;margin:0 auto;width:100%;}
.question-text{font-size:17px;font-weight:600;line-height:1.55;margin-bottom:24px;color:#2d3748;}
.options-container{display:flex;flex-direction:column;gap:12px;}
.option{
    display:flex;align-items:flex-start;gap:12px;padding:14px 18px;
    border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;
    background:#fff;transition:all 0.2s;font-size:15px;line-height:1.5;
}
.option:hover{border-color:#4a90d9;background:#f7faff;}
.option.selected{border-color:#4a90d9;background:#ebf4ff;}
.option.disabled{opacity:0.4;pointer-events:none;}
.option-letter{
    flex-shrink:0;width:28px;height:28px;border-radius:50%;
    background:#e2e8f0;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;color:#4a5568;
}
.option.selected .option-letter{background:#4a90d9;color:#fff;}
.option-text{padding-top:3px;}

/* ===== START OVERLAY (autoplay policy fallback) ===== */
.start-overlay{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(45,55,72,0.93);z-index:1000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;
}
.start-overlay h2{font-size:22px;margin-bottom:10px;font-weight:600;}
.start-overlay p{font-size:15px;color:#cbd5e0;margin-bottom:28px;max-width:480px;text-align:center;line-height:1.6;}
.btn-start-test{
    background:#4a90d9;color:#fff;border:none;
    padding:14px 48px;border-radius:8px;font-size:16px;
    font-weight:600;cursor:pointer;transition:background 0.2s;
}
.btn-start-test:hover{background:#3a7bc8;}

/* ===== FOOTER NAV ===== */
.footer-nav{
    display:flex;justify-content:flex-end;align-items:center;
    padding:12px 24px;background:#2d3748;border-top:2px solid #e2e8f0;
}
.btn-next{
    display:flex;align-items:center;gap:6px;
    background:#4a90d9;color:#fff;border:none;padding:10px 28px;
    border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;
}
.btn-next:hover{background:#3a7bc8;}
.btn-next.disabled{opacity:0.5;pointer-events:none;}
.btn-next svg{width:18px;height:18px;fill:currentColor;}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
    .main-content{flex-direction:column;}
    .left-panel{flex:0 0 auto;border-right:none;border-bottom:2px solid #e2e8f0;padding:16px;max-height:40vh;}
    .conv-image{max-height:30vh;}
    .right-panel{padding:20px 24px;}
}
</style>
</head>
<body>

<!-- START OVERLAY -->
<div class="start-overlay" id="startOverlay">
    <h2>Listen to a Conversation</h2>
    <p>You will hear a conversation between two people. After the conversation ends, answer the questions. You will NOT be able to return to previous questions.</p>
    <button class="btn-start-test" onclick="startListening()">Start Listening</button>
</div>

<!-- TOP NAV -->
<nav class="top-nav">
    <div class="nav-left">Question <strong id="qNum">9</strong> of 20 &nbsp;|&nbsp; Listening</div>
    <div class="nav-right">
        <div class="timer-display" id="timerDisplay">00:20</div>
        <button class="btn-timer-toggle" id="btnTimerToggle" onclick="toggleTimer()">Hide Time</button>
        <div class="user-badge" id="userBadge"></div>
    </div>
</nav>

<!-- PROGRESS BAR -->
<div class="progress-bar-container">
    <div class="progress-bar" id="progressBar" style="width:45%"></div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content" id="mainContent">
    <!-- Left Panel: Conversation Image -->
    <div class="left-panel" id="leftPanel">
        <img class="conv-image" id="convImage" src="" alt="Conversation scene">
        <div class="audio-indicator" id="audioIndicator">
            <div class="wave-bars">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
            <span>Playing audio...</span>
        </div>
    </div>

    <!-- Right Panel: Question + Options (hidden during audio) -->
    <div class="right-panel" id="rightPanel" style="display:none;">
        <div class="question-area" id="questionArea">
            <div class="question-text" id="questionText"></div>
            <div class="options-container" id="optionsContainer"></div>
        </div>
    </div>
</div>

<!-- FOOTER NAV -->
<div class="footer-nav">
    <button class="btn-next disabled" id="btnNext" onclick="goNext()">
        Next
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
</div>

<script src="js/auth.js"></script>

/* ===== QUESTION DATA ===== */
const pages = [
    {
        // Page 1: Conv 1 audio → Q9
        audio: 'conv1.wav',
        image: CONV1_IMAGE,
        questionNum: 9,
        questionText: 'Why does the woman go to the bookstore?',
        choices: [
            {letter:'A', text:'To return a damaged textbook'},
            {letter:'B', text:'To pick up a book she ordered'},
            {letter:'C', text:'To ask about a course reading list'},
            {letter:'D', text:'To buy a notebook for her biology class'}
        ],
        answer: 'B'
    },
    {
        // Page 2: No audio → Q10
        audio: null,
        image: CONV1_IMAGE,
        questionNum: 10,
        questionText: 'What does the man suggest the woman do?',
        choices: [
            {letter:'A', text:'Order the book from a different store'},
            {letter:'B', text:'Wait until Thursday to start reading'},
            {letter:'C', text:'Contact her professor about the assignment'},
            {letter:'D', text:'Borrow a copy from the library'}
        ],
        answer: 'D'
    },
    {
        // Page 3: Conv 2 audio → Q11
        audio: 'conv2.wav',
        image: CONV2_IMAGE,
        questionNum: 11,
        questionText: 'What problem does the woman mention about the presentation?',
        choices: [
            {letter:'A', text:'She cannot access the class website.'},
            {letter:'B', text:'She disagrees with her partner\'s approach.'},
            {letter:'C', text:'She is unsure how to narrow down the content.'},
            {letter:'D', text:'She has not started her section yet.'}
        ],
        answer: 'C'
    },
    {
        // Page 4: No audio → Q12
        audio: null,
        image: CONV2_IMAGE,
        questionNum: 12,
        questionText: 'Why does the man prefer using the class template?',
        choices: [
            {letter:'A', text:'His own design was criticized before.'},
            {letter:'B', text:'The professor requires everyone to use it.'},
            {letter:'C', text:'He does not have time to create a new one.'},
            {letter:'D', text:'The template has a built-in timer for presentations.'}
        ],
        answer: 'A'
    }
];

/* ===== STATE ===== */
let currentPage = 0;
let selectedAnswers = [null, null, null, null];
let answers = pages.map(p=>p.answer); // correct answers for scoring
let timeLeft = 20;
let timerInterval = null;
let timerHidden = false;
let audioPlaying = false;
let currentAudio = null;

/* ===== DOM REFS ===== */
const elQNum = document.getElementById('qNum');
const elProgressBar = document.getElementById('progressBar');
const elTimerDisplay = document.getElementById('timerDisplay');
const elConvImage = document.getElementById('convImage');
const elAudioIndicator = document.getElementById('audioIndicator');
const elLeftPanel = document.getElementById('leftPanel');
const elRightPanel = document.getElementById('rightPanel');
const elQuestionText = document.getElementById('questionText');
const elOptionsContainer = document.getElementById('optionsContainer');
const elBtnNext = document.getElementById('btnNext');

/* ===== TIMER ===== */
function startTimer(){
    clearInterval(timerInterval);
    timeLeft=20;
    updateTimerDisplay();
    elTimerDisplay.classList.remove('warning');
    timerInterval=setInterval(()=>{
        timeLeft--;
        updateTimerDisplay();
        if(timeLeft<=5 && timeLeft>0){elTimerDisplay.classList.add('warning');}
        if(timeLeft<=0){
            clearInterval(timerInterval);
            // Auto-advance
            autoAdvance();
        }
    },1000);
}

function updateTimerDisplay(){
    const m=String(Math.floor(timeLeft/60)).padStart(2,'0');
    const s=String(timeLeft%60).padStart(2,'0');
    elTimerDisplay.textContent=m+':'+s;
}

function toggleTimer(){
    timerHidden=!timerHidden;
    elTimerDisplay.classList.toggle('hidden-timer',timerHidden);
    document.getElementById('btnTimerToggle').textContent=timerHidden?'Show Time':'Hide Time';
}

function autoAdvance(){
    // Move to next without selection
    if(currentPage<pages.length-1){
        currentPage++;
        renderPage(currentPage, true);
    } else {
        // Last question — go to next section
        window.location.href='listening-announce.html';
    }
}

/* ===== RENDER PAGE ===== */
function renderPage(idx, playNow){
    const pg = pages[idx];

    // Update header
    elQNum.textContent = pg.questionNum;
    elProgressBar.style.width = (pg.questionNum/20*100)+'%';

    // Set image
    elConvImage.src = pg.image;

    // Clear timer
    clearInterval(timerInterval);
    elTimerDisplay.classList.remove('warning');

    if(pg.audio && playNow){
        // === AUDIO MODE: full-width image only, no question visible ===
        elLeftPanel.classList.add('full-width');
        elRightPanel.style.display = 'none';
        elAudioIndicator.classList.add('visible');
        elTimerDisplay.textContent = '--:--';
        elBtnNext.classList.add('disabled');

        playAudio(pg.audio, ()=>{
            // === Audio finished → switch to QUESTION MODE ===
            elAudioIndicator.classList.remove('visible');
            elLeftPanel.classList.remove('full-width');
            elRightPanel.style.display = 'flex';
            renderQuestion(idx);
            startTimer();
        });
    } else {
        // === NO AUDIO: show question immediately ===
        elLeftPanel.classList.remove('full-width');
        elRightPanel.style.display = 'flex';
        elAudioIndicator.classList.remove('visible');
        renderQuestion(idx);
        startTimer();
    }
}

function renderQuestion(idx){
    const pg = pages[idx];
    elQuestionText.textContent = pg.questionNum + '. ' + pg.questionText;
    elOptionsContainer.innerHTML = '';
    pg.choices.forEach(c=>{
        const div = document.createElement('div');
        div.className = 'option' + (selectedAnswers[idx]===c.letter ? ' selected' : '');
        div.innerHTML = '<div class="option-letter">'+c.letter+'</div><div class="option-text">'+c.text+'</div>';
        div.onclick = ()=>selectOption(idx, c.letter, div);
        elOptionsContainer.appendChild(div);
    });
    updateNextBtn(idx);
}

/* ===== AUDIO ===== */
function playAudio(src, onEnded){
    if(currentAudio){currentAudio.pause();currentAudio=null;}
    currentAudio = new Audio(src);
    currentAudio.onended = ()=>{
        audioPlaying=false;
        if(onEnded) onEnded();
    };
    currentAudio.onerror = ()=>{
        audioPlaying=false;
        // Show retry button on left panel
        showRetryButton(src, onEnded);
    };
    audioPlaying=true;
    currentAudio.play().catch(()=>{
        audioPlaying=false;
        // Autoplay blocked — show retry button
        showRetryButton(src, onEnded);
    });
}

function showRetryButton(src, onEnded){
    // Create a click-to-play button on the left panel
    let btn = document.getElementById('retryAudioBtn');
    if(!btn){
        btn = document.createElement('button');
        btn.id = 'retryAudioBtn';
        btn.style.cssText = 'position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:#4a90d9;color:#fff;border:none;padding:12px 36px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;z-index:10;';
        btn.textContent = '▶ Play Conversation';
        elLeftPanel.appendChild(btn);
    }
    btn.style.display = 'block';
    btn.onclick = ()=>{
        btn.style.display = 'none';
        playAudio(src, onEnded);
    };
}

/* ===== OPTIONS ===== */
function selectOption(pageIdx, letter, el){
    if(audioPlaying) return;
    selectedAnswers[pageIdx] = letter;
    // Update visual
    document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
    document.querySelectorAll('.option .option-letter').forEach(o=>{o.style.background='';o.style.color='';});
    el.classList.add('selected');
    el.querySelector('.option-letter').style.background='#4a90d9';
    el.querySelector('.option-letter').style.color='#fff';
    updateNextBtn(pageIdx);
}

function updateNextBtn(idx){
    if(selectedAnswers[idx]){
        elBtnNext.classList.remove('disabled');
    } else {
        elBtnNext.classList.add('disabled');
    }
}

/* ===== NAVIGATION ===== */
function goNext(){
    if(elBtnNext.classList.contains('disabled')) return;
    if(currentAudio){currentAudio.pause();currentAudio=null;}
    clearInterval(timerInterval);

    if(currentPage < pages.length-1){
        currentPage++;
        renderPage(currentPage, true);
    } else {
        // Save answers to sessionStorage for scoring
        const stored = JSON.parse(sessionStorage.getItem('mocktest2_answers')||'{}');
        pages.forEach((pg,i)=>{
            stored['q'+pg.questionNum] = {
                selected: selectedAnswers[i],
                correct: pg.answer
            };
        });
        sessionStorage.setItem('mocktest2_answers', JSON.stringify(stored));
        // Go to next section
        window.location.href='listening-announce.html';
    }
}

/* ===== INIT ===== */
// Show start overlay first. User click guarantees audio autoplay works.
function startListening(){
    document.getElementById('startOverlay').style.display='none';
    // Set up audio-only view for first page
    renderPage(0, true);
}

// If coming from listening-lcr.html via Next click (has ?play=1),
// skip the overlay since we already have user interaction context.
(function init(){
    const params = new URLSearchParams(window.location.search);
    if(params.get('play')==='1'){
        document.getElementById('startOverlay').style.display='none';
        renderPage(0, true);
    }
    // Otherwise, wait for startListening() click
})();
</script>
