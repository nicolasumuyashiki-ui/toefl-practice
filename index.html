<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCK Workshop — TOEFL iBT Practice Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
<style>
body{justify-content:flex-start}
.top-bar{display:flex}
.logo-mark{display:inline-flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.logo{font-family:var(--font-en);font-size:.78em;font-weight:800;color:var(--green);letter-spacing:.14em;text-transform:uppercase}
.header-divider{width:1px;height:16px;background:var(--ink-200);margin:0 12px}
.header-title{font-size:.88em;color:var(--ink-500);font-weight:500}
.login-card{background:var(--white);border:1px solid var(--paper);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,40,23,.08);width:100%;max-width:440px;overflow:hidden}
.login-header{background:linear-gradient(135deg,var(--green-deep),var(--green-dark));padding:40px 32px 32px;text-align:center;color:#fff;position:relative;overflow:hidden}
.login-header::before{content:"";position:absolute;top:0;right:0;width:160px;height:100%;background:radial-gradient(circle at top right, rgba(201,169,97,.18), transparent 70%);pointer-events:none}
.login-icon{width:56px;height:56px;background:rgba(255,255,255,.12);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;position:relative;z-index:1}
.login-icon svg{width:28px;height:28px;fill:#fff}
.login-header .kicker{font-family:var(--font-en);font-size:.7em;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;position:relative;z-index:1}
.login-header h1{font-family:var(--font-en);font-size:1.4em;font-weight:800;letter-spacing:-0.01em;margin-bottom:6px;position:relative;z-index:1}
.login-header p{font-size:.88em;color:rgba(255,255,255,.78);position:relative;z-index:1}
.login-body{padding:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-family:var(--font-en);font-size:.7em;font-weight:800;color:var(--green);margin-bottom:8px;text-transform:uppercase;letter-spacing:.14em}
.form-input{width:100%;padding:12px 14px 12px 42px;font-size:.95em;font-family:var(--font-en),var(--font-jp);border:1.5px solid var(--paper);border-radius:10px;background:var(--white);color:var(--ink-900);outline:none;transition:border-color .2s, box-shadow .2s}
.form-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,118,70,.12)}
.form-input::placeholder{color:var(--ink-200)}
.input-wrap{position:relative}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;fill:var(--ink-500);pointer-events:none}
.btn-login{width:100%;padding:13px;font-family:var(--font-en);font-size:1em;font-weight:700;color:#fff;background:var(--green);border:none;border-radius:999px;cursor:pointer;transition:all .2s;margin-top:6px;letter-spacing:.01em}
.btn-login:hover{background:var(--green-dark);box-shadow:0 6px 18px rgba(0,118,70,.22);transform:translateY(-1px)}
.btn-login:disabled{background:var(--ink-200);color:var(--ink-500);cursor:not-allowed;transform:none;box-shadow:none}
.error-msg{background:#FDF4F0;border:1px solid #E5B8A0;border-left:4px solid var(--terracotta);color:#8A3E24;border-radius:10px;padding:10px 14px;font-size:.85em;margin-bottom:16px;display:none;align-items:center;gap:8px}
.error-msg.show{display:flex}
.error-msg svg{width:16px;height:16px;fill:var(--terracotta);flex-shrink:0}
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.login-footer{border-top:1px solid var(--paper);padding:16px 32px;text-align:center;font-size:.78em;color:var(--ink-500);font-family:var(--font-en)}
</style>
<!-- Start of HubSpot Embed Code --><script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/242729130.js"></script><!-- End of HubSpot Embed Code -->
</head>
<body>
<div class="top-bar">
  <div class="logo-mark">
    <span class="logo-dot"></span>
    <span class="logo">TCK Workshop</span>
    <span class="header-divider"></span>
    <span class="header-title">TOEFL iBT Practice Test</span>
  </div>
</div>
<div class="main">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
      <div class="kicker">Practice Test</div>
      <h1>Practice Test Login</h1>
      <p>Enter your credentials to begin</p>
    </div>
    <div class="login-body">
      <div class="error-msg" id="errorMsg">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <span id="errorText"></span>
      </div>
      <div class="form-group">
        <label>User ID</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <input type="text" class="form-input" id="userId" placeholder="e.g. user01" autocomplete="username" autofocus>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          <input type="password" class="form-input" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
      </div>
      <button class="btn-login" id="loginBtn" onclick="doLogin()">
        <span id="loginBtnText">Log In</span>
      </button>
    </div>
    <div class="login-footer">TCK Workshop &mdash; TOEFL iBT Practice System</div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  if (Auth.get()) location.href = 'mic-check.html';

  document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('userId').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('password').focus(); });

  async function doLogin(){
    const uid  = document.getElementById('userId').value.trim();
    const pass = document.getElementById('password').value.trim();
    const btn  = document.getElementById('loginBtn');
    const txt  = document.getElementById('loginBtnText');
    const err  = document.getElementById('errorMsg');
    const errT = document.getElementById('errorText');

    if(!uid||!pass){ err.classList.add('show'); errT.textContent='IDとパスワードを入力してください。'; return; }

    err.classList.remove('show');
    btn.disabled=true;
    txt.innerHTML='<span class="spinner"></span>Logging in...';

    try {
      const result = await API.login(uid, pass);
      if(result.success){
        Auth.save({ id: result.userId, name: result.userName });
        // Dev/staff skip: ?goto=speaking-lr / speaking-ti / writing-sentence / etc.
        // Lets reviewers jump past the long Reading + Listening flow when
        // testing late-stage features. URL param survives login redirect.
        var qs = new URLSearchParams(location.search);
        var skipTo = qs.get('goto');
        var ALLOWED_SKIP = {
          'mic-check': 'mic-check.html',
          'reading': 'reading-intro.html',
          'listening': 'listening-intro.html',
          'writing': 'writing-intro.html',
          'speaking': 'speaking-intro.html',
          'speaking-lr': 'speaking-lr.html',
          'speaking-ti': 'speaking-ti.html',
          'results': 'results.html'
        };
        location.href = (skipTo && ALLOWED_SKIP[skipTo]) || 'mic-check.html';
      } else {
        err.classList.add('show');
        errT.textContent = result.message || 'Login failed.';
        btn.disabled=false; txt.textContent='Log In';
        document.getElementById('password').value='';
        document.getElementById('password').focus();
      }
    } catch(e){
      err.classList.add('show');
      errT.textContent = 'Connection error: ' + e.message;
      btn.disabled=false; txt.textContent='Log In';
    }
  }
</script>
</body>
</html>
