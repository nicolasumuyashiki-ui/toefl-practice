<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL iBT - Writing Transition</title>
<link rel="stylesheet" href="css/common.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope','Zen Kaku Gothic New','Noto Sans JP',system-ui,sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column;color:#002817;line-height:1.6}
.section-nav{background:#fff;border-bottom:1px solid #F5E9D3;padding:12px 24px;display:flex;align-items:center;gap:14px}
.section-nav-label{font-size:.95em;color:#5A6861;font-weight:500}
.section-body{flex:1;display:flex;justify-content:center;align-items:center;padding:60px 24px 120px}
.section-content{width:100%;max-width:640px}
.section-content h2{font-size:1.35em;font-weight:700;color:#002817;margin-bottom:16px}
.section-content p{font-size:.95em;color:#5A6861;line-height:1.7;margin-bottom:20px}
.user-badge{font-size:.85em;color:#5A6861;margin-left:auto}
.section-footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F5E9D3;padding:14px 24px;display:flex;justify-content:flex-end}
.btn-start{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;font-size:.95em;font-family:inherit;font-weight:600;color:#fff;background:#007646;border:none;border-radius:999px;cursor:pointer}
.btn-start:hover{background:#004D2E;box-shadow:0 6px 18px rgba(0,118,70,.22);transform:translateY(-1px)}
.btn-start svg{width:16px;height:16px;fill:currentColor}
</style>
</head>
<body>
<div class="section-nav">
  <span class="section-nav-label">Writing</span>
  <span class="user-badge" id="userBadge"></span>
</div>
<div class="section-body">
  <div class="section-content">
    <h2>Next Task: Academic Discussion</h2>
    <p>You have completed Write an Email. The next task is the Academic Discussion (10 minutes).</p>
    <p>Click Continue when you are ready to begin.</p>
  </div>
</div>
<div class="section-footer">
  <button class="btn-start" onclick="window.location.href='writing-discussion.html'">
    Continue
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>
</div>
<script src="js/auth.js"></script>
<script>
if(typeof Auth!=='undefined'){Auth.require();Auth.showBadge('userBadge');}
</script>
</body>
</html>
