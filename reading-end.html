<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL iBT - End of Reading</title>
<link rel="stylesheet" href="css/common.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column;color:#2d3748;line-height:1.6}
.reading-nav{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;align-items:center;gap:14px}
.reading-nav-close{width:32px;height:32px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;color:#4a5568;font-size:1.2em;transition:background .2s}
.reading-nav-close:hover{background:#f7fafc}
.reading-nav-label{font-size:.95em;color:#4a5568;font-weight:500}
.reading-progress{height:4px;background:#ebf4ff;width:100%;flex-shrink:0}
.reading-progress-fill{height:100%;width:100%;background:#3182ce;border-radius:2px}
.reading-body{flex:1;display:flex;justify-content:center;align-items:center;padding:60px 24px 120px}
.reading-content{width:100%;max-width:640px}
.reading-content h2{font-size:1.35em;font-weight:700;color:#1a202c;margin-bottom:16px}
.reading-content p{font-size:.95em;color:#4a5568;line-height:1.7;margin-bottom:20px}
.user-badge{font-size:.85em;color:#718096;margin-left:auto}
.user-badge strong{color:#2d3748}
.reading-footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;padding:14px 24px;display:flex;justify-content:flex-end}
.btn-start{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;font-size:.95em;font-family:inherit;font-weight:600;color:#fff;background:#2d3748;border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.btn-start:hover{background:#1a202c}
.btn-start svg{width:16px;height:16px;fill:currentColor}
</style>
</head>
<body>

<div class="reading-nav">
  <button class="reading-nav-close" onclick="goBack()" title="Back">&times;</button>
  <span class="reading-nav-label">Reading</span>
  <span class="user-badge" id="userBadge"></span>
</div>
<div class="reading-progress"><div class="reading-progress-fill"></div></div>

<div class="reading-body">
  <div class="reading-content">
    <h2>End of Reading Section</h2>
    <p>You have finished the Reading section. Thank you for your effort.</p>
  </div>
</div>

<div class="reading-footer">
  <button class="btn-start" onclick="goNext()">
    Next Section
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>
</div>

<script src="js/auth.js"></script>
<script>
if (typeof Auth !== 'undefined') {
  Auth.require();
  Auth.showBadge('userBadge');
}

function goBack() {
  window.history.back();
}

function goNext() {
  window.location.href = 'listening-intro.html';
}
</script>
</body>
</html>
