<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL iBT - Listen to an Academic Talk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#ebf4ff;color:#2d3748;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.top-nav{display:flex;justify-content:space-between;align-items:center;background:#2d3748;color:#fff;padding:10px 24px;font-size:14px;}
.nav-left{font-weight:500;}.nav-left strong{color:#90cdf4;}
.nav-right{display:flex;align-items:center;gap:16px;}
.timer-display{font-family:'Courier New',monospace;font-size:15px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:4px;background:rgba(255,255,255,0.1);}
.timer-display.warning{color:#fc8181;animation:blink 0.8s infinite;}
.timer-display.hidden-timer{visibility:hidden;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.btn-timer-toggle{background:none;border:1px solid rgba(255,255,255,0.3);color:#cbd5e0;padding:4px 12px;border-radius:4px;font-size:12px;cursor:pointer;}
.btn-timer-toggle:hover{background:rgba(255,255,255,0.1);}
.user-badge{background:rgba(255,255,255,0.15);padding:4px 12px;border-radius:12px;font-size:12px;color:#e2e8f0;}
.progress-bar-container{height:4px;background:#e2e8f0;}
.progress-bar{height:100%;background:#4a90d9;transition:width 0.4s ease;}
.main-content{flex:1;display:flex;overflow:hidden;}
.left-panel{flex:0 0 50%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f0f4f8;border-right:2px solid #e2e8f0;padding:24px;position:relative;transition:flex-basis 0.3s ease;}
.left-panel.full-width{flex:1 1 100%;border-right:none;}
.speaker-image{max-width:90%;max-height:65vh;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.audio-indicator{display:none;position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(45,55,72,0.9);color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;align-items:center;gap:12px;}
.audio-indicator.visible{display:flex;}
.wave-bars{display:flex;gap:3px;align-items:flex-end;height:20px;}
.wave-bar{width:3px;background:#90cdf4;border-radius:2px;animation:wave 1s ease-in-out infinite;}
.wave-bar:nth-child(1){height:8px;animation-delay:0s;}
.wave-bar:nth-child(2){height:14px;animation-delay:0.15s;}
.wave-bar:nth-child(3){height:20px;animation-delay:0.3s;}
.wave-bar:nth-child(4){height:14px;animation-delay:0.45s;}
.wave-bar:nth-child(5){height:8px;animation-delay:0.6s;}
@keyframes wave{0%,100%{transform:scaleY(0.5);}50%{transform:scaleY(1);}}
.right-panel{flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 40px;overflow-y:auto;}
.question-area{max-width:560px;margin:0 auto;width:100%;}
.question-text{font-size:17px;font-weight:600;line-height:1.55;margin-bottom:24px;color:#2d3748;}
.options-container{display:flex;flex-direction:column;gap:12px;}
.option{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;background:#fff;transition:all 0.2s;font-size:15px;line-height:1.5;}
.option:hover{border-color:#4a90d9;background:#f7faff;}
.option.selected{border-color:#4a90d9;background:#ebf4ff;}
.option-letter{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#4a5568;}
.option.selected .option-letter{background:#4a90d9;color:#fff;}
.option-text{padding-top:3px;}
.start-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(45,55,72,0.93);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;}
.start-overlay h2{font-size:22px;margin-bottom:10px;font-weight:600;}
.start-overlay p{font-size:15px;color:#cbd5e0;margin-bottom:28px;max-width:480px;text-align:center;line-height:1.6;}
.btn-start-test{background:#4a90d9;color:#fff;border:none;padding:14px 48px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:background 0.2s;}
.btn-start-test:hover{background:#3a7bc8;}
.footer-nav{display:flex;justify-content:flex-end;align-items:center;padding:12px 24px;background:#2d3748;border-top:2px solid #e2e8f0;}
.btn-next{display:flex;align-items:center;gap:6px;background:#4a90d9;color:#fff;border:none;padding:10px 28px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-next:hover{background:#3a7bc8;}
.btn-next.disabled{opacity:0.5;pointer-events:none;}
.btn-next svg{width:18px;height:18px;fill:currentColor;}
@media(max-width:900px){.main-content{flex-direction:column;}.left-panel{flex:0 0 auto;border-right:none;border-bottom:2px solid #e2e8f0;padding:16px;max-height:40vh;}.speaker-image{max-height:30vh;}.right-panel{padding:20px 24px;}}
</style>
</head>

    <button class="btn-start-test" onclick="startListening()">Start Listening</button>
</div>

</nav>

    <div class="right-panel" id="rightPanel" style="display:none;">
        <div class="question-area" id="questionArea">
            <div class="question-text" id="questionText"></div>
            <div class="options-container" id="optionsContainer"></div>
        </div>
    </div>
</div>

const pages = [
    {audio:'talk1.wav',image:TALK1_IMAGE,questionNum:17,questionText:'What is the lecture mainly about?',choices:[{letter:'A',text:'The history of sea otter conservation efforts.'},{letter:'B',text:'A type of species that plays a critical role in its ecosystem.'},{letter:'C',text:'The importance of kelp forests for marine biodiversity.'},{letter:'D',text:'How hunting has affected ocean ecosystems worldwide.'}],answer:'B'},
    {audio:null,image:TALK1_IMAGE,questionNum:18,questionText:'Why does the professor discuss sea otters?',choices:[{letter:'A',text:'To explain why fur hunting became illegal.'},{letter:'B',text:'To describe a species that is currently endangered.'},{letter:'C',text:'To illustrate the concept of a keystone species.'},{letter:'D',text:'To compare sea otters with other marine mammals.'}],answer:'C'},
    {audio:null,image:TALK1_IMAGE,questionNum:19,questionText:'According to the professor, what happened when sea otters were removed from the ecosystem?',choices:[{letter:'A',text:'Kelp forests grew uncontrollably.'},{letter:'B',text:'Sea urchin populations declined rapidly.'},{letter:'C',text:'Other predators replaced the sea otters.'},{letter:'D',text:'Sea urchins destroyed large areas of kelp.'}],answer:'D'},
    {audio:null,image:TALK1_IMAGE,questionNum:20,questionText:'What does the professor imply about conservation strategies?',choices:[{letter:'A',text:'Protecting keystone species is more efficient than protecting every species.'},{letter:'B',text:'Keystone species are always the largest animals in an ecosystem.'},{letter:'C',text:'Conservation efforts are most successful in ocean environments.'},{letter:'D',text:'It is impossible to restore an ecosystem once a species is lost.'}],answer:'A'},
    {audio:'talk2.wav',image:TALK2_IMAGE,questionNum:21,questionText:'What is the talk mainly about?',choices:[{letter:'A',text:'Common pricing strategies used by clothing retailers.'},{letter:'B',text:'A cognitive bias that influences how people make decisions.'},{letter:'C',text:'The psychology behind salary negotiations.'},{letter:'D',text:'How judges determine appropriate sentences.'}],answer:'B'},
    {audio:null,image:TALK2_IMAGE,questionNum:22,questionText:'According to the professor, what happens when a customer sees an expensive item first?',choices:[{letter:'A',text:'The customer is more likely to leave the store.'},{letter:'B',text:'The customer becomes suspicious of the pricing.'},{letter:'C',text:'A lower-priced item seems more reasonable by comparison.'},{letter:'D',text:'The customer is less likely to make any purchase.'}],answer:'C'},
    {audio:null,image:TALK2_IMAGE,questionNum:23,questionText:'Which of the following is NOT mentioned as an area affected by anchoring?',choices:[{letter:'A',text:'Pricing in retail stores.'},{letter:'B',text:'Medical diagnosis decisions.'},{letter:'C',text:'Real estate transactions.'},{letter:'D',text:'Legal sentencing judgments.'}],answer:'B'},
    {audio:null,image:TALK2_IMAGE,questionNum:24,questionText:'What will the professor most likely discuss next?',choices:[{letter:'A',text:'How to recognize and counter the anchoring effect.'},{letter:'B',text:'The history of behavioral economics research.'},{letter:'C',text:'Other examples of expensive retail products.'},{letter:'D',text:'How anchoring differs across cultures.'}],answer:'A'}
];

let currentPage=0,selectedAnswers=Array(8).fill(null),timeLeft=30,timerInterval=null,timerHidden=false,audioPlaying=false,currentAudio=null;
const elQNum=document.getElementById('qNum'),elProgressBar=document.getElementById('progressBar'),elTimerDisplay=document.getElementById('timerDisplay'),elSpeakerImage=document.getElementById('speakerImage'),elAudioIndicator=document.getElementById('audioIndicator'),elLeftPanel=document.getElementById('leftPanel'),elRightPanel=document.getElementById('rightPanel'),elQuestionText=document.getElementById('questionText'),elOptionsContainer=document.getElementById('optionsContainer'),elBtnNext=document.getElementById('btnNext');

function startTimer(){clearInterval(timerInterval);timeLeft=30;updateTimerDisplay();elTimerDisplay.classList.remove('warning');timerInterval=setInterval(()=>{timeLeft--;updateTimerDisplay();if(timeLeft<=5&&timeLeft>0)elTimerDisplay.classList.add('warning');if(timeLeft<=0){clearInterval(timerInterval);autoAdvance();}},1000);}
function updateTimerDisplay(){const m=String(Math.floor(timeLeft/60)).padStart(2,'0'),s=String(timeLeft%60).padStart(2,'0');elTimerDisplay.textContent=m+':'+s;}
function toggleTimer(){timerHidden=!timerHidden;elTimerDisplay.classList.toggle('hidden-timer',timerHidden);document.getElementById('btnTimerToggle').textContent=timerHidden?'Show Time':'Hide Time';}
function autoAdvance(){if(currentPage<pages.length-1){currentPage++;renderPage(currentPage,true);}else{finishSection();}}

function renderPage(idx,playNow){
    const pg=pages[idx];
    elQNum.textContent=pg.questionNum;
    elProgressBar.style.width=(pg.questionNum/24*100)+'%';
    elSpeakerImage.src=pg.image;
    clearInterval(timerInterval);elTimerDisplay.classList.remove('warning');
    if(pg.audio&&playNow){
        elLeftPanel.classList.add('full-width');elRightPanel.style.display='none';
        elAudioIndicator.classList.add('visible');elTimerDisplay.textContent='--:--';
        elBtnNext.classList.add('disabled');
        playAudio(pg.audio,()=>{elAudioIndicator.classList.remove('visible');elLeftPanel.classList.remove('full-width');elRightPanel.style.display='flex';renderQuestion(idx);startTimer();});
    }else{
        elLeftPanel.classList.remove('full-width');elRightPanel.style.display='flex';
        elAudioIndicator.classList.remove('visible');renderQuestion(idx);startTimer();
    }
}
function renderQuestion(idx){
    const pg=pages[idx];elQuestionText.textContent=pg.questionNum+'. '+pg.questionText;
    elOptionsContainer.innerHTML='';
    pg.choices.forEach(c=>{const div=document.createElement('div');div.className='option'+(selectedAnswers[idx]===c.letter?' selected':'');div.innerHTML='<div class="option-letter">'+c.letter+'</div><div class="option-text">'+c.text+'</div>';div.onclick=()=>selectOption(idx,c.letter,div);elOptionsContainer.appendChild(div);});
    updateNextBtn(idx);
}
function playAudio(src,onEnded){if(currentAudio){currentAudio.pause();currentAudio=null;}currentAudio=new Audio(src);currentAudio.onended=()=>{audioPlaying=false;if(onEnded)onEnded();};currentAudio.onerror=()=>{audioPlaying=false;showRetryButton(src,onEnded);};audioPlaying=true;currentAudio.play().catch(()=>{audioPlaying=false;showRetryButton(src,onEnded);});}
function showRetryButton(src,onEnded){let btn=document.getElementById('retryAudioBtn');if(!btn){btn=document.createElement('button');btn.id='retryAudioBtn';btn.style.cssText='position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:#4a90d9;color:#fff;border:none;padding:12px 36px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;z-index:10;';btn.textContent='▶ Play Lecture';elLeftPanel.appendChild(btn);}btn.style.display='block';btn.onclick=()=>{btn.style.display='none';playAudio(src,onEnded);};}
function selectOption(pageIdx,letter,el){if(audioPlaying)return;selectedAnswers[pageIdx]=letter;document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));document.querySelectorAll('.option .option-letter').forEach(o=>{o.style.background='';o.style.color='';});el.classList.add('selected');el.querySelector('.option-letter').style.background='#4a90d9';el.querySelector('.option-letter').style.color='#fff';updateNextBtn(pageIdx);}
function updateNextBtn(idx){if(selectedAnswers[idx])elBtnNext.classList.remove('disabled');else elBtnNext.classList.add('disabled');}
function goNext(){if(elBtnNext.classList.contains('disabled'))return;if(currentAudio){currentAudio.pause();currentAudio=null;}clearInterval(timerInterval);if(currentPage<pages.length-1){currentPage++;renderPage(currentPage,true);}else{finishSection();}}
function finishSection(){const stored=JSON.parse(sessionStorage.getItem('mocktest2_answers')||'{}');pages.forEach((pg,i)=>{stored['q'+pg.questionNum]={selected:selectedAnswers[i],correct:pg.answer};});sessionStorage.setItem('mocktest2_answers',JSON.stringify(stored));window.location.href='listening-end.html';}
function startListening(){
    document.getElementById('startOverlay').style.display='none';
    const pg=pages[0];
    // Set up audio-only UI immediately
    elSpeakerImage.src=pg.image;
    elQNum.textContent=pg.questionNum;
    elProgressBar.style.width=(pg.questionNum/(pg.questionNum>16?24:20)*100)+'%';
    if(pg.audio){
        elLeftPanel.classList.add('full-width');elRightPanel.style.display='none';
        elAudioIndicator.classList.add('visible');elTimerDisplay.textContent='--:--';
        elBtnNext.classList.add('disabled');
        // Create and play audio IMMEDIATELY in click context
        currentAudio=new Audio(pg.audio);
        audioPlaying=true;
        currentAudio.onended=()=>{audioPlaying=false;elAudioIndicator.classList.remove('visible');elLeftPanel.classList.remove('full-width');elRightPanel.style.display='flex';renderQuestion(0);startTimer();};
        currentAudio.onerror=()=>{audioPlaying=false;showRetryButton(pg.audio,()=>{elAudioIndicator.classList.remove('visible');elLeftPanel.classList.remove('full-width');elRightPanel.style.display='flex';renderQuestion(0);startTimer();});};
        currentAudio.play().catch(()=>{audioPlaying=false;showRetryButton(pg.audio,()=>{elAudioIndicator.classList.remove('visible');elLeftPanel.classList.remove('full-width');elRightPanel.style.display='flex';renderQuestion(0);startTimer();});});
    } else {
        renderPage(0,true);
    }
}
(function init(){const params=new URLSearchParams(window.location.search);if(params.get('play')==='1'){document.getElementById('startOverlay').style.display='none';renderPage(0,true);}})();
</script>
