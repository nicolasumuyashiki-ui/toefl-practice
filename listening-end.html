<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL iBT - End of Listening</title>
<link rel="stylesheet" href="css/common.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope','Zen Kaku Gothic New','Noto Sans JP',system-ui,sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column;color:#002817;line-height:1.6}
.listening-nav{background:#fff;border-bottom:1px solid #F5E9D3;padding:12px 24px;display:flex;align-items:center;gap:14px}
.listening-nav-label{font-size:.95em;color:#5A6861;font-weight:500}
.listening-progress{height:4px;background:#F5E9D3;width:100%;flex-shrink:0}
.listening-progress-fill{height:100%;width:100%;background:#007646;border-radius:2px}
.listening-body{flex:1;display:flex;justify-content:center;align-items:center;padding:60px 24px 120px}
.listening-content{width:100%;max-width:640px}
.listening-content h2{font-size:1.35em;font-weight:700;color:#002817;margin-bottom:16px}
.listening-content p{font-size:.95em;color:#5A6861;line-height:1.7;margin-bottom:20px}
.user-badge{font-size:.85em;color:#5A6861;margin-left:auto}
.user-badge strong{color:#002817}
.listening-footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F5E9D3;padding:14px 24px;display:flex;justify-content:flex-end}
.btn-start{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;font-size:.95em;font-family:inherit;font-weight:600;color:#fff;background:#007646;border:none;border-radius:999px;cursor:pointer;transition:all .2s}
.btn-start:hover{background:#004D2E;box-shadow:0 6px 18px rgba(0,118,70,.22);transform:translateY(-1px)}
.btn-start svg{width:16px;height:16px;fill:currentColor}
.note{margin-top:12px;padding:14px 18px;background:#fef5e7;border-left:3px solid #ed8936;border-radius:4px;font-size:.85em;color:#8A6D2A}
</style>
</head>
<body>

<div class="listening-nav">
  <span class="listening-nav-label">Listening</span>
  <span class="user-badge" id="userBadge"></span>
</div>
<div class="listening-progress"><div class="listening-progress-fill"></div></div>

<div class="listening-body">
  <div class="listening-content">
    <h2>Listening Section Complete</h2>
    <p>You have finished the Listening section. Great work staying focused through the audio passages.</p>
    <p>リスニングセクションが終了しました。次はWritingセクションです。</p>
    <div class="note">Continue to the Writing section to complete the practice test.</div>
  </div>
</div>

<div class="listening-footer">
  <button class="btn-start" onclick="goNext()">
    Continue to Writing
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>
</div>

<script src="js/auth.js"></script>
<script>
if (typeof Auth !== 'undefined') {
  Auth.require();
  Auth.showBadge('userBadge');
}
function goNext() {
  window.location.href = 'writing-intro.html';
}
</script>
</body>
</html>
